name: Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/mtgdeckbuilder-backend:latest

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/mtgdeckbuilder-frontend:latest
          build-args: |
            VITE_API_URL=${{ secrets.VITE_API_URL }}

      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # Backend
            docker stop mtgdeckbuilder-backend || true
            docker rm mtgdeckbuilder-backend || true
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/mtgdeckbuilder-backend:latest
            docker run -d \
              --name mtgdeckbuilder-backend \
              --net ${{ secrets.DOCKER_NETWORK }} \
              -p 8090:8090 \
              -e ENV=prod \
              -e PORT=8090 \
              -e JWT_SECRET=${{ secrets.JWT_SECRET }} \
              -e DB_URI=${{ secrets.DB_URI }} \
              -e ALLOWED_ORIGINS=${{ secrets.ALLOWED_ORIGINS }} \
              ${{ secrets.DOCKERHUB_USERNAME }}/mtgdeckbuilder-backend:latest

            # Frontend
            docker stop mtgdeckbuilder-frontend || true
            docker rm mtgdeckbuilder-frontend || true
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/mtgdeckbuilder-frontend:latest
            docker run -d \
              --name mtgdeckbuilder-frontend \
              --net ${{ secrets.DOCKER_NETWORK }} \
              -p 3001:80 \
              ${{ secrets.DOCKERHUB_USERNAME }}/mtgdeckbuilder-frontend:latest

            docker image prune -f
