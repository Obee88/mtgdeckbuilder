name: Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push app image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/mtgdeckbuilder:latest

      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: DOCKERHUB_USERNAME,DOCKER_NETWORK,JWT_SECRET,MONGODB_URI
          script: |
            docker stop mtgdeckbuilder || true
            docker rm mtgdeckbuilder || true
            docker pull "$DOCKERHUB_USERNAME/mtgdeckbuilder:latest"
            docker run -d \
              --name mtgdeckbuilder \
              --net "$DOCKER_NETWORK" \
              -p 3001:8080 \
              -e NODE_ENV=production \
              -e PORT=8080 \
              -e JWT_SECRET="$JWT_SECRET" \
              -e MONGODB_URI="$MONGODB_URI" \
              "$DOCKERHUB_USERNAME/mtgdeckbuilder:latest"

            docker image prune -f
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKER_NETWORK: ${{ secrets.DOCKER_NETWORK }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
