name: Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push app image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/mtgdeckbuilder:latest

      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            docker stop mtgdeckbuilder || true
            docker rm mtgdeckbuilder || true
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/mtgdeckbuilder:latest
            docker run -d \
              --name mtgdeckbuilder \
              --net ${{ secrets.DOCKER_NETWORK }} \
              -p 3001:8090 \
              -e ENV=prod \
              -e PORT=8090 \
              -e JWT_SECRET=${{ secrets.JWT_SECRET }} \
              -e DB_URI=${{ secrets.DB_URI }} \
              ${{ secrets.DOCKERHUB_USERNAME }}/mtgdeckbuilder:latest

            docker image prune -f
